<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWZ · Projetos</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0f1c;
            --sidebar-bg: #101524;
            --card-bg: #171e2f;
            --border: #1e293b;
            --text: #f1f5f9;
            --muted: #94a3b8;
            --primary: #3b82f6;
            --secondary: #8b5cf6;
            --hover: #1e293b;
            --danger: #ef4444;
            --radius: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
            flex-shrink: 0;
            padding: 1.5rem 0;
        }
        .sidebar-header {
            padding: 0 1.5rem 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.2rem;
        }
        .sidebar-header p { font-size: 0.75rem; color: var(--muted); }
        .nav-list { list-style: none; padding: 1rem 0.5rem; flex: 1; }
        .nav-item {
            padding: 0.6rem 1.2rem;
            margin: 0.2rem 0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: #cbd5e1;
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .nav-item:hover { background: var(--hover); }
        .nav-item.active {
            background: rgba(59,130,246,0.15);
            color: var(--primary);
            font-weight: 600;
        }
        .nav-item svg { width: 18px; height: 18px; opacity: 0.8; }
        .sidebar-footer {
            padding: 0.5rem 1.2rem;
            font-size: 0.7rem;
            color: var(--muted);
            border-top: 1px solid var(--border);
        }
        .main { flex: 1; display: flex; flex-direction: column; overflow-y: auto; }
        .top-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2rem;
            border-bottom: 1px solid var(--border);
        }
        .search-box {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 8px;
            padding: 0.5rem 1rem;
            color: var(--text);
            font-size: 0.9rem;
            width: 300px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box:focus { border-color: var(--primary); }
        .btn-create {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 0.6rem 1.2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            transition: opacity 0.2s;
        }
        .btn-create:hover { opacity: 0.92; }
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1.5rem;
            padding: 2rem;
            align-content: start;
        }
        .design-card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            position: relative;
        }
        .design-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 24px rgba(0,0,0,0.3);
            border-color: #334155;
        }
        .card-preview {
            height: 140px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .preview-badge {
            position: absolute;
            top: 0.8rem;
            left: 0.8rem;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            padding: 0.2rem 0.7rem;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 600;
            color: white;
        }
        .preview-icon { font-size: 2.5rem; opacity: 0.5; }
        .card-info { padding: 1rem; }
        .card-title {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-meta {
            font-size: 0.75rem;
            color: var(--muted);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .favorite-star {
            position: absolute;
            top: 0.8rem;
            right: 0.8rem;
            font-size: 1.2rem;
            color: #64748b;
            cursor: pointer;
            z-index: 5;
            transition: color 0.2s;
            background: none;
            border: none;
        }
        .favorite-star.active { color: #fbbf24; }
        .card-actions-hover {
            position: absolute;
            bottom: 0.5rem;
            right: 0.5rem;
            display: flex;
            gap: 0.3rem;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .design-card:hover .card-actions-hover { opacity: 1; }
        .action-icon {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(6px);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        .action-icon:hover { background: var(--primary); }
        .empty-message { grid-column: 1 / -1; text-align: center; padding: 3rem; color: var(--muted); }
        .toast-container {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .toast {
            background: var(--card-bg);
            border: 1px solid var(--border);
            padding: 0.8rem 1.2rem;
            border-radius: 0.6rem;
            font-size: 0.9rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease, fadeOut 0.5s 2.5s forwards;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .toast.success { border-left: 4px solid #10b981; }
        .toast.error { border-left: 4px solid var(--danger); }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
        @keyframes fadeOut { to { opacity: 0; transform: translateY(-10px); } }
        @media (max-width: 700px) {
            .sidebar { display: none; }
            .top-bar { flex-direction: column; align-items: flex-start; gap: 0.8rem; }
        }
    </style>
</head>
<body>

    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>JWZ Projetos</h2>
            <p>Centro de apresentações</p>
        </div>
        <ul class="nav-list">
            <li class="nav-item active" data-filter="all">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="3"/><line x1="3" y1="9" x2="21" y2="9"/></svg>
                Todos os projetos
            </li>
            <li class="nav-item" data-filter="favorites">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                Favoritos
            </li>
            <li class="nav-item" data-filter="ceo">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                CEO
            </li>
            <li class="nav-item" data-filter="interna">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg>
                Interna
            </li>
        </ul>
        <div class="sidebar-footer">© JWZ Team & Vision</div>
    </aside>

    <main class="main">
        <div class="top-bar">
            <input type="text" class="search-box" placeholder="Buscar apresentações..." id="searchInput">
            <button class="btn-create" id="createNewBtn">+ Criar novo projeto</button>
        </div>
        <div class="projects-grid" id="projectsGrid">
            <div class="empty-message">Carregando projetos...</div>
        </div>
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script>
        (function() {
            firebase.initializeApp({
                apiKey: "AIzaSyDPerdPbaYCgzJzpqBK6IMHdMaCVXijGPA",
                authDomain: "canva-jwz.firebaseapp.com",
                projectId: "canva-jwz",
                storageBucket: "canva-jwz.firebasestorage.app",
                messagingSenderId: "492129376064",
                appId: "1:492129376064:web:f2ade84324e2d975dd4ca5"
            });
            const db = firebase.firestore();

            const ceoSlides = [
                { type: 'title', tag: 'LANÇAMENTO OFICIAL', title: 'JWZ Platform', subtitle: 'Do Cadastro à Primeira Conexão', description: 'Facilitando o Home Office para quem oferece e para quem contrata.' },
                { type: 'list', title: 'O Grande Desafio do Home Office', items: ['Dificuldade para encontrar profissionais qualificados', 'Processos de contratação lentos e caros', 'Falta de portfólio confiável', 'Oportunidades dispersas'] },
                { type: 'content', title: 'A Solução é a JWZ', text: 'A plataforma que conecta talento remoto com oportunidades reais de forma simples e confiável.' },
                { type: 'cards', title: 'O DIFERENCIAL DO SITE', cards: [{ title: 'Para o Prestador', desc: 'Cadastro focado em habilidades, portfólio e experiência.' }, { title: 'Para o Contratante', desc: 'Encontre rapidamente os melhores profissionais para home office.' }] },
                { type: 'list', title: 'PLANO DE PRODUÇÃO DO VÍDEO (Reels)', items: ['Gancho de Atenção (Problema real)', 'Demonstração prática da JWZ', 'Call to Action forte'] },
                { type: 'cards', title: 'CRONOGRAMA DE EXECUÇÃO', cards: [{ title: '1. Pré-produção', desc: 'Roteiro e planejamento.' }, { title: '2. Produção', desc: 'Gravação e edição.' }, { title: '3. Lançamento', desc: 'Publicação estratégica.' }] },
                { type: 'final', title: 'Vamos transformar a JWZ em referência!', text: 'O futuro do trabalho remoto começa agora.' }
            ];

            const internaSlides = [
                { type: 'title', tag: 'INTERNA', title: 'Apresentação Interna', subtitle: 'JWZ TEAM & VISION', description: 'Disciplina, Cultura e Crescimento Coletivo' },
                { type: 'content', title: 'Quem Somos', text: 'A JWZ é uma empresa de tecnologia que desenvolve soluções digitais de alta qualidade.' },
                { type: 'list', title: 'Código de Conduta Interna', items: ['Transparência Total', 'Comprometimento com Prazos', 'Respeito à Marca', 'Confidencialidade'] },
                { type: 'cards', title: 'Funil de Disciplina', cards: [{ title: '01 Advertência', desc: 'Casos leves' }, { title: '02 Suspensão', desc: 'Afastamento temporário' }, { title: '03 Expulsão', desc: 'Quebra de confiança' }] },
                { type: 'list', title: 'Regras de Saída', items: ['Aviso prévio', 'Repasse de acessos', 'Não-competição'] },
                { type: 'cards', title: 'Nossa Cultura', cards: [{ title: 'Trabalho em Equipe', desc: 'Colaboração e conquistas coletivas.' }, { title: 'Disciplina', desc: 'Prazos e alto padrão.' }, { title: 'Transparência', desc: 'Comunicação aberta.' }, { title: 'Crescimento Contínuo', desc: 'Aprendizado constante.' }] },
                { type: 'final', title: 'Vamos crescer juntos!', text: 'Obrigado pela atenção!' }
            ];

            const defaultTheme = { bgColor: '#0F172A', primaryColor: '#3B82F6', secondaryColor: '#8B5CF6', textColor: '#F8FAFC' };

            let allPresentations = [];
            let currentFilter = 'all';
            let favorites = JSON.parse(localStorage.getItem('jwz_favorites') || '[]');

            const grid = document.getElementById('projectsGrid');
            const searchInput = document.getElementById('searchInput');
            const createBtn = document.getElementById('createNewBtn');
            const navItems = document.querySelectorAll('.nav-item');

            function showToast(message, type = 'success') {
                const container = document.getElementById('toastContainer');
                const toast = document.createElement('div');
                toast.className = `toast ${type}`;
                toast.textContent = message;
                container.appendChild(toast);
                setTimeout(() => toast.remove(), 3000);
            }

            async function seedDefaultPresentations() {
                try {
                    const snapshot = await db.collection('presentations').get();
                    if (!snapshot.empty) return;
                    await db.collection('presentations').add({
                        title: 'Apresentação CEO',
                        theme: defaultTheme,
                        slides: ceoSlides,
                        category: 'ceo',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    await db.collection('presentations').add({
                        title: 'Apresentação Interna',
                        theme: defaultTheme,
                        slides: internaSlides,
                        category: 'interna',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    console.log('Seed concluído: CEO e Interna criadas.');
                } catch (error) {
                    console.error('Erro ao criar apresentações padrão:', error);
                    showToast('Erro ao carregar apresentações padrão.', 'error');
                }
            }

            async function loadPresentations() {
                try {
                    await seedDefaultPresentations();
                    const snapshot = await db.collection('presentations').orderBy('updatedAt', 'desc').get();
                    allPresentations = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    renderGrid();
                } catch (error) {
                    console.error('Erro ao carregar apresentações:', error);
                    grid.innerHTML = '<div class="empty-message">Erro ao conectar com o Firebase.</div>';
                    showToast('Falha na conexão.', 'error');
                }
            }

            function getFilteredPresentations() {
                let filtered = [...allPresentations];
                if (currentFilter === 'favorites') {
                    filtered = filtered.filter(p => favorites.includes(p.id));
                } else if (currentFilter === 'ceo') {
                    filtered = filtered.filter(p => p.category === 'ceo' || p.title.toLowerCase().includes('ceo'));
                } else if (currentFilter === 'interna') {
                    filtered = filtered.filter(p => p.category === 'interna' || p.title.toLowerCase().includes('interna'));
                }
                const query = searchInput.value.toLowerCase();
                if (query) {
                    filtered = filtered.filter(p => p.title.toLowerCase().includes(query) || (p.slides[0]?.tag || '').toLowerCase().includes(query));
                }
                return filtered;
            }

            function renderGrid() {
                const list = getFilteredPresentations();
                grid.innerHTML = '';
                if (list.length === 0) {
                    grid.innerHTML = '<div class="empty-message">Nenhum projeto encontrado.</div>';
                    return;
                }
                list.forEach(pres => {
                    const slideCount = pres.slides ? pres.slides.length : 0;
                    const firstTag = pres.slides[0]?.tag || '';
                    const updatedDate = pres.updatedAt ? new Date(pres.updatedAt.toMillis()).toLocaleDateString('pt-BR') : '';
                    const isFav = favorites.includes(pres.id);

                    const card = document.createElement('div');
                    card.className = 'design-card';
                    card.innerHTML = `
                        <div class="card-preview">
                            <span class="preview-badge">${firstTag || pres.title}</span>
                            <span class="preview-icon">📄</span>
                            <button class="favorite-star ${isFav ? 'active' : ''}" data-id="${pres.id}">★</button>
                            <div class="card-actions-hover">
                                <button class="action-icon view-btn" data-id="${pres.id}">👁</button>
                                <button class="action-icon edit-btn" data-id="${pres.id}">✎</button>
                                <button class="action-icon export-btn" data-id="${pres.id}">⤓</button>
                                <button class="action-icon delete-btn" data-id="${pres.id}">🗑</button>
                            </div>
                        </div>
                        <div class="card-info">
                            <div class="card-title">${pres.title}</div>
                            <div class="card-meta"><span>${slideCount} slide(s)</span><span>${updatedDate}</span></div>
                        </div>
                    `;
                    grid.appendChild(card);

                    card.querySelector('.favorite-star').addEventListener('click', (e) => {
                        e.stopPropagation();
                        toggleFavorite(pres.id);
                    });
                    card.querySelector('.view-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        window.open(`apresentacao.html?id=${pres.id}`, '_blank');
                    });
                    card.querySelector('.edit-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        window.open(`projeto.html?id=${pres.id}`, '_blank');
                    });
                    card.querySelector('.export-btn').addEventListener('click', (e) => {
                        e.stopPropagation();
                        exportJSON(pres);
                    });
                    card.querySelector('.delete-btn').addEventListener('click', async (e) => {
                        e.stopPropagation();
                        if (confirm(`Excluir "${pres.title}"?`)) {
                            try {
                                await db.collection('presentations').doc(pres.id).delete();
                                showToast('Projeto excluído.');
                                await loadPresentations();
                            } catch (error) {
                                showToast('Erro ao excluir.', 'error');
                            }
                        }
                    });
                });
            }

            function toggleFavorite(id) {
                const idx = favorites.indexOf(id);
                if (idx >= 0) {
                    favorites.splice(idx, 1);
                } else {
                    favorites.push(id);
                }
                localStorage.setItem('jwz_favorites', JSON.stringify(favorites));
                renderGrid();
            }

            function exportJSON(pres) {
                const blob = new Blob([JSON.stringify({ id: pres.id, ...pres }, null, 2)], { type: 'application/json' });
                const a = document.createElement('a');
                a.href = URL.createObjectURL(blob);
                a.download = `${pres.title.replace(/\s+/g, '_')}.json`;
                a.click();
            }

            navItems.forEach(item => {
                item.addEventListener('click', () => {
                    navItems.forEach(i => i.classList.remove('active'));
                    item.classList.add('active');
                    currentFilter = item.dataset.filter;
                    renderGrid();
                });
            });

            searchInput.addEventListener('input', renderGrid);

            // NOVA FORMA DE CRIAR PROJETO: gera ID na hora e abre o editor direto
            createBtn.addEventListener('click', () => {
                const newId = crypto.randomUUID ? crypto.randomUUID() : Date.now().toString(36) + Math.random().toString(36).substring(2);
                const newWindow = window.open(`projeto.html?id=${newId}`, '_blank');
                if (!newWindow) {
                    showToast('Popup bloqueado. Permita pop‑ups para este site.', 'error');
                }
            });

            loadPresentations();
        })();
    </script>
</body>
</html>
