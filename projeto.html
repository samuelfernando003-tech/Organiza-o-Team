<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Projeto · JWZ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b1120;
            --surface: #131b2f;
            --border: #1e293b;
            --text: #f8fafc;
            --muted: #94a3b8;
            --primary: #3b82f6;
            --secondary: #8b5cf6;
            --success: #10b981;
            --danger: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }
        .sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .sidebar-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h2 {
            font-size: 1.3rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .sidebar-header p { font-size: 0.8rem; color: var(--muted); }
        .thumbnails {
            flex: 1;
            padding: 0.8rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            overflow-y: auto;
        }
        .thumb {
            background: #1e293b;
            border: 2px solid transparent;
            border-radius: 0.8rem;
            padding: 0.8rem 1rem;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            gap: 0.7rem;
            font-size: 0.85rem;
            color: #cbd5e1;
        }
        .thumb.active {
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(59,130,246,0.3);
        }
        .thumb:hover { background: #273450; }
        .thumb .idx {
            background: var(--primary);
            color: white;
            width: 22px;
            height: 22px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.7rem;
            flex-shrink: 0;
        }
        .thumb .t-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .thumb .del {
            display: none;
            background: none;
            border: none;
            color: var(--danger);
            cursor: pointer;
            font-size: 1rem;
        }
        .thumb:hover .del { display: block; }
        .add-slide {
            margin: 0.5rem 0.8rem 1rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            padding: 0.7rem;
            border-radius: 0.8rem;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: opacity 0.2s;
        }
        .add-slide:hover { opacity: 0.9; }
        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        .sidebar-footer button {
            background: #1e293b;
            border: 1px solid #334155;
            color: #cbd5e1;
            padding: 0.6rem;
            border-radius: 0.6rem;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .sidebar-footer button:hover { background: #273450; border-color: var(--primary); }
        .sidebar-footer .save-btn {
            background: linear-gradient(135deg, var(--success), #059669);
            border: none;
            color: white;
            font-weight: 600;
        }
        .sidebar-footer .view-btn {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            color: white;
            font-weight: 600;
        }
        .main { flex: 1; display: flex; flex-direction: column; height: 100vh; }
        .toolbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 0.8rem 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }
        .toolbar input[type="text"] {
            background: #1e293b;
            border: 1px solid #334155;
            color: var(--text);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
            width: 260px;
            outline: none;
        }
        .toolbar input[type="text"]:focus { border-color: var(--primary); }
        .toolbar label {
            font-size: 0.8rem;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .toolbar input[type="color"] {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: transparent;
        }
        .editor-body { flex: 1; display: flex; overflow: hidden; }
        .preview {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            padding: 2rem;
        }
        .preview-window {
            width: 100%;
            max-width: 900px;
            aspect-ratio: 16/9;
            background: #0f172a;
            border-radius: 1.2rem;
            box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 3rem;
            text-align: center;
            transition: background 0.3s;
        }
        .preview-window h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .preview-window h2 { font-size: 2rem; font-weight: 700; margin-bottom: 1rem; }
        .preview-window p, .preview-window li { font-size: 1rem; line-height: 1.6; max-width: 600px; color: #cbd5e1; }
        .preview-window ul { list-style: none; text-align: left; }
        .preview-window ul li::before { content: "🔹"; margin-right: 0.5rem; color: var(--primary); }
        .preview-window .card-grid-preview { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-top: 1rem; }
        .preview-window .card-preview {
            background: #1e293b;
            border-radius: 0.8rem;
            padding: 1rem 1.3rem;
            width: 200px;
            text-align: left;
            border: 1px solid #334155;
        }
        .preview-window .card-preview h3 { font-size: 1rem; margin-bottom: 0.5rem; }
        .preview-window .tag-preview {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            padding: 0.4rem 1.2rem;
            border-radius: 2rem;
            font-weight: 600;
            font-size: 0.8rem;
            display: inline-block;
            margin-bottom: 1rem;
        }
        .properties {
            width: 320px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            padding: 1.2rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .properties h3 { font-size: 1rem; font-weight: 600; }
        .properties label { display: flex; flex-direction: column; gap: 0.3rem; font-size: 0.8rem; color: var(--muted); }
        .properties input, .properties textarea, .properties select {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 0.5rem;
            padding: 0.6rem;
            color: var(--text);
            font-family: inherit;
            font-size: 0.85rem;
            outline: none;
            resize: vertical;
        }
        .properties input:focus, .properties textarea:focus, .properties select:focus { border-color: var(--primary); }
        .card-props { display: flex; flex-direction: column; gap: 0.8rem; max-height: 300px; overflow-y: auto; }
        .card-prop-item { background: #1e293b; border-radius: 0.5rem; padding: 0.7rem; border: 1px solid #334155; }
        .card-prop-item input { width: 100%; margin-bottom: 0.3rem; }
        .btn-sm { background: #334155; border: none; color: white; padding: 0.3rem 0.8rem; border-radius: 0.4rem; cursor: pointer; font-size: 0.75rem; }
        .btn-sm.danger { background: #7f1d1d; }
        .type-selector { display: flex; gap: 0.3rem; flex-wrap: wrap; }
        .type-selector button {
            background: #1e293b;
            border: 1px solid #334155;
            color: #cbd5e1;
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
        }
        .type-selector button.active-type { background: var(--primary); border-color: var(--primary); color: white; }
        .back-btn {
            position: fixed;
            top: 1rem;
            left: 1rem;
            z-index: 50;
            background: rgba(19,27,47,0.9);
            border: 1px solid #334155;
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .toast {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--success);
            color: white;
            padding: 0.8rem 1.5rem;
            border-radius: 0.6rem;
            font-weight: 600;
            z-index: 200;
            animation: fadeInOut 2s forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateY(20px); }
            15% { opacity: 1; transform: translateY(0); }
            85% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>
    <button class="back-btn" onclick="window.location.href='index.html'">← Voltar ao Hub</button>

    <div class="sidebar">
        <div class="sidebar-header">
            <h2>JWZ Editor</h2>
            <p>Arraste para reordenar</p>
        </div>
        <div class="thumbnails" id="thumbnails"></div>
        <button class="add-slide" id="addSlideBtn">+ Adicionar Slide</button>
        <div class="sidebar-footer">
            <button id="loadCeoBtn">📥 Carregar CEO</button>
            <button id="loadInternaBtn">📥 Carregar Interna</button>
            <button class="view-btn" id="viewBtn">▶ Visualizar</button>
            <button class="save-btn" id="saveBtn">💾 Salvar no Firebase</button>
        </div>
    </div>

    <div class="main">
        <div class="toolbar">
            <input type="text" id="presTitle" placeholder="Título da apresentação">
            <label>Fundo <input type="color" id="bgColor" value="#0F172A"></label>
            <label>Primária <input type="color" id="primaryColor" value="#3B82F6"></label>
            <label>Secundária <input type="color" id="secondaryColor" value="#8B5CF6"></label>
            <label>Texto <input type="color" id="textColor" value="#F8FAFC"></label>
        </div>
        <div class="editor-body">
            <div class="preview">
                <div class="preview-window" id="previewWindow"></div>
            </div>
            <div class="properties" id="propertiesPanel">
                <h3>Propriedades do Slide</h3>
                <div id="slideForm"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
    <script>
        (function() {
            firebase.initializeApp({
                apiKey: "AIzaSyDPerdPbaYCgzJzpqBK6IMHdMaCVXijGPA",
                authDomain: "canva-jwz.firebaseapp.com",
                projectId: "canva-jwz",
                storageBucket: "canva-jwz.firebasestorage.app",
                messagingSenderId: "492129376064",
                appId: "1:492129376064:web:f2ade84324e2d975dd4ca5"
            });
            const db = firebase.firestore();
            const params = new URLSearchParams(window.location.search);
            let presId = params.get('id') || null; // pode ser null se acessado sem ID

            const defaultSlide = { type: 'content', title: 'Novo Slide', text: 'Conteúdo aqui...', tag: '', subtitle: '', description: '', items: [], cards: [] };
            const defaultTheme = { bgColor: '#0F172A', primaryColor: '#3B82F6', secondaryColor: '#8B5CF6', textColor: '#F8FAFC' };

            const ceoSlides = [
                { type: 'title', tag: 'LANÇAMENTO OFICIAL', title: 'JWZ Platform', subtitle: 'Do Cadastro à Primeira Conexão', description: 'Facilitando o Home Office para quem oferece e para quem contrata.' },
                { type: 'list', title: 'O Grande Desafio do Home Office', items: ['Dificuldade para encontrar profissionais qualificados', 'Processos de contratação lentos e caros', 'Falta de portfólio confiável', 'Oportunidades dispersas'] },
                { type: 'content', title: 'A Solução é a JWZ', text: 'A plataforma que conecta talento remoto com oportunidades reais de forma simples e confiável.' },
                { type: 'cards', title: 'O DIFERENCIAL DO SITE', cards: [{ title: 'Para o Prestador', desc: 'Cadastro focado em habilidades, portfólio e experiência.' }, { title: 'Para o Contratante', desc: 'Encontre rapidamente os melhores profissionais para home office.' }] },
                { type: 'list', title: 'PLANO DE PRODUÇÃO DO VÍDEO (Reels)', items: ['Gancho de Atenção (Problema real)', 'Demonstração prática da JWZ', 'Call to Action forte'] },
                { type: 'cards', title: 'CRONOGRAMA DE EXECUÇÃO', cards: [{ title: '1. Pré-produção', desc: 'Roteiro e planejamento.' }, { title: '2. Produção', desc: 'Gravação e edição.' }, { title: '3. Lançamento', desc: 'Publicação estratégica.' }] },
                { type: 'final', title: 'Vamos transformar a JWZ em referência!', text: 'O futuro do trabalho remoto começa agora.' }
            ];

            const internaSlides = [
                { type: 'title', tag: 'INTERNA', title: 'Apresentação Interna', subtitle: 'JWZ TEAM & VISION', description: 'Disciplina, Cultura e Crescimento Coletivo' },
                { type: 'content', title: 'Quem Somos', text: 'A JWZ é uma empresa de tecnologia que desenvolve soluções digitais de alta qualidade.' },
                { type: 'list', title: 'Código de Conduta Interna', items: ['Transparência Total', 'Comprometimento com Prazos', 'Respeito à Marca', 'Confidencialidade'] },
                { type: 'cards', title: 'Funil de Disciplina', cards: [{ title: '01 Advertência', desc: 'Casos leves' }, { title: '02 Suspensão', desc: 'Afastamento temporário' }, { title: '03 Expulsão', desc: 'Quebra de confiança' }] },
                { type: 'list', title: 'Regras de Saída', items: ['Aviso prévio', 'Repasse de acessos', 'Não-competição'] },
                { type: 'cards', title: 'Nossa Cultura', cards: [{ title: 'Trabalho em Equipe', desc: 'Colaboração e conquistas coletivas.' }, { title: 'Disciplina', desc: 'Prazos e alto padrão.' }, { title: 'Transparência', desc: 'Comunicação aberta.' }, { title: 'Crescimento Contínuo', desc: 'Aprendizado constante.' }] },
                { type: 'final', title: 'Vamos crescer juntos!', text: 'Obrigado pela atenção!' }
            ];

            let presentation = {
                title: 'Nova Apresentação',
                theme: { ...defaultTheme },
                slides: [ { ...defaultSlide } ]
            };
            let currentIndex = 0;

            const thumbnailsEl = document.getElementById('thumbnails');
            const previewEl = document.getElementById('previewWindow');
            const formEl = document.getElementById('slideForm');
            const presTitleInput = document.getElementById('presTitle');
            const bgInput = document.getElementById('bgColor');
            const prInput = document.getElementById('primaryColor');
            const scInput = document.getElementById('secondaryColor');
            const txInput = document.getElementById('textColor');

            function renderAll() {
                renderThumbnails();
                renderPreview();
                renderForm();
                presTitleInput.value = presentation.title;
                bgInput.value = presentation.theme.bgColor;
                prInput.value = presentation.theme.primaryColor;
                scInput.value = presentation.theme.secondaryColor;
                txInput.value = presentation.theme.textColor;
            }

            function renderThumbnails() {
                thumbnailsEl.innerHTML = '';
                presentation.slides.forEach((s, i) => {
                    const div = document.createElement('div');
                    div.className = 'thumb' + (i === currentIndex ? ' active' : '');
                    div.innerHTML = `<span class="idx">${i+1}</span><span class="t-title">${s.title || s.type}</span><button class="del">🗑️</button>`;
                    div.querySelector('.del')?.addEventListener('click', (e) => {
                        e.stopPropagation();
                        if (presentation.slides.length > 1) {
                            presentation.slides.splice(i, 1);
                            if (currentIndex >= presentation.slides.length) currentIndex--;
                            renderAll();
                        }
                    });
                    div.addEventListener('click', () => {
                        currentIndex = i;
                        renderAll();
                    });
                    thumbnailsEl.appendChild(div);
                });
            }

            function renderPreview() {
                const s = presentation.slides[currentIndex];
                if (!s) return;
                previewEl.style.backgroundColor = presentation.theme.bgColor;
                previewEl.style.backgroundImage = 'none';
                let html = '';
                switch (s.type) {
                    case 'title':
                        html = `${s.tag ? `<div class="tag-preview">${s.tag}</div>` : ''}<h1>${s.title || ''}</h1>${s.subtitle ? `<p style="font-size:1.2rem;font-weight:600">${s.subtitle}</p>` : ''}${s.description ? `<p>${s.description}</p>` : ''}`;
                        break;
                    case 'content':
                        html = `<h2>${s.title || ''}</h2><p>${s.text || ''}</p>`;
                        break;
                    case 'list':
                        html = `<h2>${s.title || ''}</h2><ul>${(s.items || []).map(i => `<li>${i}</li>`).join('')}</ul>`;
                        break;
                    case 'cards':
                        html = `<h2>${s.title || ''}</h2><div class="card-grid-preview">${(s.cards || []).map(c => `<div class="card-preview"><h3>${c.title}</h3><p>${c.desc}</p></div>`).join('')}</div>`;
                        break;
                    case 'final':
                        html = `<h1 style="background:none;-webkit-text-fill-color:white;color:white">${s.title || ''}</h1><p style="font-size:1.3rem;color:white">${s.text || ''}</p>`;
                        previewEl.style.background = `linear-gradient(135deg, ${presentation.theme.primaryColor}, ${presentation.theme.secondaryColor})`;
                        break;
                }
                previewEl.innerHTML = html;
            }

            function renderForm() {
                const s = presentation.slides[currentIndex];
                if (!s) return;
                const types = ['title','content','list','cards','final'];
                formEl.innerHTML = `
                    <div class="type-selector">${types.map(t => `<button class="${s.type === t ? 'active-type' : ''}" data-type="${t}">${t.charAt(0).toUpperCase() + t.slice(1)}</button>`).join('')}</div>
                    ${getFieldsHTML(s)}
                `;
                formEl.querySelectorAll('.type-selector button').forEach(btn => {
                    btn.addEventListener('click', function() {
                        s.type = this.dataset.type;
                        renderAll();
                    });
                });
                bindFieldEvents(s);
            }

            function getFieldsHTML(s) {
                switch (s.type) {
                    case 'title':
                        return `<label>Tag<input id="fTag" value="${s.tag || ''}"></label>
                                <label>Título<input id="fTitle" value="${s.title || ''}"></label>
                                <label>Subtítulo<input id="fSub" value="${s.subtitle || ''}"></label>
                                <label>Descrição<textarea id="fDesc">${s.description || ''}</textarea></label>`;
                    case 'content':
                        return `<label>Título<input id="fTitle" value="${s.title || ''}"></label>
                                <label>Texto<textarea id="fText">${s.text || ''}</textarea></label>`;
                    case 'list':
                        return `<label>Título<input id="fTitle" value="${s.title || ''}"></label>
                                <div class="card-props" id="listItems"></div>
                                <button class="btn-sm" id="addItem">+ Item</button>`;
                    case 'cards':
                        return `<label>Título<input id="fTitle" value="${s.title || ''}"></label>
                                <div class="card-props" id="cardsContainer"></div>
                                <button class="btn-sm" id="addCard">+ Card</button>`;
                    case 'final':
                        return `<label>Título<input id="fTitle" value="${s.title || ''}"></label>
                                <label>Texto<textarea id="fText">${s.text || ''}</textarea></label>`;
                    default:
                        return '';
                }
            }

            function bindFieldEvents(s) {
                const set = (id, prop) => {
                    const el = document.getElementById(id);
                    if (el) el.addEventListener('input', () => { s[prop] = el.value; renderPreview(); });
                };
                set('fTitle', 'title');
                set('fText', 'text');
                set('fTag', 'tag');
                set('fSub', 'subtitle');
                set('fDesc', 'description');

                if (s.type === 'list') {
                    const container = document.getElementById('listItems');
                    if (container) {
                        container.innerHTML = '';
                        s.items.forEach((item, i) => {
                            const div = document.createElement('div');
                            div.className = 'card-prop-item';
                            div.innerHTML = `<input value="${item}" data-idx="${i}" class="item-input"><button class="btn-sm danger rem-item">Remover</button>`;
                            container.appendChild(div);
                        });
                        document.querySelectorAll('.item-input').forEach(inp => {
                            inp.addEventListener('input', function() { s.items[this.dataset.idx] = this.value; renderPreview(); });
                        });
                        document.querySelectorAll('.rem-item').forEach(btn => {
                            btn.addEventListener('click', function() {
                                const idx = this.previousElementSibling.dataset.idx;
                                s.items.splice(idx, 1);
                                renderAll();
                            });
                        });
                    }
                    document.getElementById('addItem')?.addEventListener('click', () => {
                        s.items.push('Novo item');
                        renderAll();
                    });
                }

                if (s.type === 'cards') {
                    const container = document.getElementById('cardsContainer');
                    if (container) {
                        container.innerHTML = '';
                        s.cards.forEach((card, i) => {
                            const div = document.createElement('div');
                            div.className = 'card-prop-item';
                            div.innerHTML = `<input value="${card.title}" placeholder="Título" data-idx="${i}" class="ctitle"><input value="${card.desc}" placeholder="Descrição" data-idx="${i}" class="cdesc"><button class="btn-sm danger rem-card">Remover</button>`;
                            container.appendChild(div);
                        });
                        document.querySelectorAll('.ctitle').forEach(inp => {
                            inp.addEventListener('input', function() { s.cards[this.dataset.idx].title = this.value; renderPreview(); });
                        });
                        document.querySelectorAll('.cdesc').forEach(inp => {
                            inp.addEventListener('input', function() { s.cards[this.dataset.idx].desc = this.value; renderPreview(); });
                        });
                        document.querySelectorAll('.rem-card').forEach(btn => {
                            btn.addEventListener('click', function() {
                                const idx = this.parentElement.querySelector('input').dataset.idx;
                                s.cards.splice(idx, 1);
                                renderAll();
                            });
                        });
                    }
                    document.getElementById('addCard')?.addEventListener('click', () => {
                        s.cards.push({ title: 'Novo Card', desc: 'Descrição' });
                        renderAll();
                    });
                }
            }

            // Eventos da toolbar
            [bgInput, prInput, scInput, txInput].forEach(inp => {
                inp.addEventListener('input', () => {
                    presentation.theme.bgColor = bgInput.value;
                    presentation.theme.primaryColor = prInput.value;
                    presentation.theme.secondaryColor = scInput.value;
                    presentation.theme.textColor = txInput.value;
                    renderPreview();
                });
            });
            presTitleInput.addEventListener('input', () => { presentation.title = presTitleInput.value; });

            document.getElementById('addSlideBtn').addEventListener('click', () => {
                presentation.slides.push({ ...defaultSlide });
                currentIndex = presentation.slides.length - 1;
                renderAll();
            });

            function toast(msg) {
                const t = document.createElement('div');
                t.className = 'toast';
                t.textContent = msg;
                document.body.appendChild(t);
                setTimeout(() => t.remove(), 2000);
            }

            document.getElementById('saveBtn').addEventListener('click', async () => {
                if (!presId) {
                    // Criar novo documento
                    try {
                        const docRef = await db.collection('presentations').add({
                            title: presentation.title,
                            theme: presentation.theme,
                            slides: presentation.slides,
                            category: 'general',
                            createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                        presId = docRef.id;
                        window.history.replaceState({}, '', `?id=${presId}`);
                        toast('Projeto criado e salvo! ✅');
                    } catch (e) {
                        console.error(e);
                        toast('Erro ao salvar.');
                    }
                } else {
                    try {
                        await db.collection('presentations').doc(presId).set({
                            title: presentation.title,
                            theme: presentation.theme,
                            slides: presentation.slides,
                            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                        }, { merge: true });
                        toast('Salvo com sucesso! ✅');
                    } catch (e) {
                        console.error(e);
                        toast('Erro ao salvar.');
                    }
                }
            });

            document.getElementById('viewBtn').addEventListener('click', () => {
                if (!presId) {
                    alert('Salve a apresentação primeiro.');
                    return;
                }
                window.open(`apresentacao.html?id=${presId}`, '_blank');
            });

            document.getElementById('loadCeoBtn').addEventListener('click', () => {
                presentation.slides = JSON.parse(JSON.stringify(ceoSlides));
                presentation.title = 'Apresentação CEO';
                currentIndex = 0;
                renderAll();
            });

            document.getElementById('loadInternaBtn').addEventListener('click', () => {
                presentation.slides = JSON.parse(JSON.stringify(internaSlides));
                presentation.title = 'Apresentação Interna';
                currentIndex = 0;
                renderAll();
            });

            // Inicialização: carrega do Firestore se ID existir
            async function init() {
                if (presId) {
                    try {
                        const doc = await db.collection('presentations').doc(presId).get();
                        if (doc.exists) {
                            const data = doc.data();
                            presentation.title = data.title || 'Nova Apresentação';
                            presentation.theme = data.theme || defaultTheme;
                            presentation.slides = data.slides || [ { ...defaultSlide } ];
                        }
                    } catch (e) {
                        console.warn('Falha ao carregar, iniciando em branco.');
                    }
                }
                renderAll();
            }

            init();
        })();
    </script>
</body>
</html>
