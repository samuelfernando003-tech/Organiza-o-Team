<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apresentação Interna · JWZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0F172A;
      color: #F8FAFC;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slide-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    .slide {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem;
      opacity: 0;
      transition: opacity 0.5s ease;
      text-align: center;
    }
    .slide.active {
      opacity: 1;
      z-index: 2;
    }
    .slide h1 {
      font-size: 3.5rem;
      font-weight: 800;
      margin-bottom: 2rem;
      line-height: 1.2;
    }
    .slide h2 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
    }
    .slide p, .slide li {
      font-size: 1.2rem;
      line-height: 1.6;
      max-width: 700px;
      color: #CBD5E1;
    }
    .card-grid {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 2rem;
    }
    .card-item {
      background: #1E293B;
      border-radius: 1.2rem;
      padding: 2rem;
      width: 260px;
      text-align: left;
      border: 1px solid #334155;
    }
    .card-item h3 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
      font-weight: 600;
    }
    .page-indicator {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.9rem;
      color: #64748B;
      z-index: 10;
    }
    .exit-btn {
      position: fixed;
      top: 2rem;
      right: 2rem;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #F8FAFC;
      padding: 0.5rem 1.2rem;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 0.9rem;
      z-index: 10;
    }
  </style>
</head>
<body>
  <button class="exit-btn" onclick="window.location.href='/'">← Voltar ao Hub</button>
  <div class="slide-container" id="slideContainer"></div>
  <div class="page-indicator" id="pageIndicator"></div>

  <script>
    // Array de slides – basta alterar o conteúdo para cada apresentação
    const slides = [
      {
        type: 'title',
        title: 'Apresentação Interna',
        subtitle: 'JWZ TEAM & VISION',
        tag: 'Disciplina, Cultura e Crescimento Coletivo'
      },
      {
        type: 'content',
        title: 'Quem Somos',
        text: 'A JWZ é uma empresa de tecnologia que desenvolve soluções digitais de alta qualidade. Nosso objetivo é entregar excelência técnica com transparência e foco em resultados.'
      },
      {
        type: 'list',
        title: 'Código de Conduta Interna',
        items: [
          'Transparência Total: Relatar problemas assim que surgirem',
          'Comprometimento com Prazos: Cumprir o combinado',
          'Respeito à Marca: Profissionalismo dentro e fora da empresa',
          'Confidencialidade: Proteger informações internas'
        ]
      },
      {
        type: 'cards',
        title: 'Funil de Disciplina',
        cards: [
          { title: '01 Advertência', desc: 'Verbal ou escrita para casos leves' },
          { title: '02 Suspensão', desc: 'Afastamento temporário em reincidência' },
          { title: '03 Expulsão', desc: 'Casos graves de quebra de confiança' }
        ]
      },
      {
        type: 'list',
        title: 'Regras de Saída e Sucessão',
        items: [
          'Comunicar saída com aviso prévio adequado',
          'Realizar repasse completo de acessos e conhecimentos',
          'Respeitar cláusula de não-competição'
        ]
      },
      {
        type: 'cards',
        title: 'Nossa Cultura',
        cards: [
          { title: 'Trabalho em Equipe', desc: 'Colaboramos, ajudamos uns aos outros e celebramos conquistas coletivas.' },
          { title: 'Disciplina', desc: 'Cumprimos prazos e mantemos alto padrão de qualidade.' },
          { title: 'Transparência', desc: 'Comunicamos abertamente problemas e ideias.' },
          { title: 'Crescimento Contínuo', desc: 'Aprendemos sempre e buscamos melhorar.' }
        ]
      },
      {
        type: 'final',
        title: 'Vamos crescer juntos!',
        text: 'Disciplina, respeito e comprometimento são a base do nosso sucesso. Obrigado pela atenção!'
      }
    ];

    let currentSlide = 0;
    const container = document.getElementById('slideContainer');
    const indicator = document.getElementById('pageIndicator');

    function renderSlide(index) {
      const slide = slides[index];
      if (!slide) return;
      
      let html = '';
      switch (slide.type) {
        case 'title':
          html = `<div class="slide active">
                    <span class="card-tag" style="background:linear-gradient(135deg,#3B82F6,#8B5CF6);padding:0.5rem 1.5rem;border-radius:2rem;font-weight:600;">${slide.subtitle}</span>
                    <h1 style="margin-top:2rem;">${slide.title}</h1>
                    <p style="font-size:1.3rem;color:#94A3B8;">${slide.tag}</p>
                  </div>`;
          break;
        case 'content':
          html = `<div class="slide active">
                    <h1>${slide.title}</h1>
                    <p>${slide.text}</p>
                  </div>`;
          break;
        case 'list':
          const itemsHtml = slide.items.map(i => `<li style="margin-bottom:1rem;text-align:left;">✅ ${i}</li>`).join('');
          html = `<div class="slide active">
                    <h2>${slide.title}</h2>
                    <ul style="list-style:none;margin-top:2rem;">${itemsHtml}</ul>
                  </div>`;
          break;
        case 'cards':
          const cardsHtml = slide.cards.map(c => `
            <div class="card-item">
              <h3>${c.title}</h3>
              <p>${c.desc}</p>
            </div>
          `).join('');
          html = `<div class="slide active">
                    <h2>${slide.title}</h2>
                    <div class="card-grid">${cardsHtml}</div>
                  </div>`;
          break;
        case 'final':
          html = `<div class="slide active" style="background: linear-gradient(135deg, #3B82F6, #8B5CF6);">
                    <h1 style="color:white;">${slide.title}</h1>
                    <p style="font-size:1.5rem;color:white;">${slide.text}</p>
                  </div>`;
          break;
        default: html = '';
      }
      container.innerHTML = html;
      indicator.textContent = `${index + 1} / ${slides.length}`;
    }

    function nextSlide() {
      if (currentSlide < slides.length - 1) {
        currentSlide++;
        renderSlide(currentSlide);
      }
    }
    function prevSlide() {
      if (currentSlide > 0) {
        currentSlide--;
        renderSlide(currentSlide);
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        nextSlide();
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        prevSlide();
      } else if (e.key === 'Escape') {
        window.location.href = '/';
      }
    });

    // Inicializa
    renderSlide(0);
  </script>
</body>
</html>
