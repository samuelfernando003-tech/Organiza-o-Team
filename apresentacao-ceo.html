<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Apresentação CEO · JWZ</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0F172A;
      color: #F8FAFC;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slide-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    .slide {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 4rem;
      opacity: 0;
      transition: opacity 0.5s ease;
      text-align: center;
    }
    .slide.active {
      opacity: 1;
      z-index: 2;
    }
    .slide h1 {
      font-size: 3.5rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
      line-height: 1.2;
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .slide h2 {
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: #F8FAFC;
    }
    .slide p, .slide li {
      font-size: 1.2rem;
      line-height: 1.6;
      max-width: 700px;
      color: #CBD5E1;
    }
    .card-grid {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 2rem;
    }
    .card-item {
      background: #1E293B;
      border-radius: 1.2rem;
      padding: 2rem;
      width: 260px;
      text-align: left;
      border: 1px solid #334155;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card-item:hover {
      transform: translateY(-3px);
      box-shadow: 0 15px 30px rgba(59,130,246,0.15);
      border-color: #3B82F6;
    }
    .card-item h3 {
      font-size: 1.4rem;
      margin-bottom: 1rem;
      font-weight: 600;
      color: #F8FAFC;
    }
    .card-item p {
      color: #94A3B8;
      font-size: 0.95rem;
    }
    .page-indicator {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.9rem;
      color: #64748B;
      z-index: 10;
      background: #1E293B;
      padding: 0.4rem 1.5rem;
      border-radius: 2rem;
    }
    .exit-btn {
      position: fixed;
      top: 2rem;
      right: 2rem;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #F8FAFC;
      padding: 0.5rem 1.5rem;
      border-radius: 2rem;
      cursor: pointer;
      font-size: 0.9rem;
      z-index: 10;
      backdrop-filter: blur(5px);
      transition: background 0.3s;
    }
    .exit-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    .tag {
      background: linear-gradient(135deg, #3B82F6, #8B5CF6);
      padding: 0.5rem 1.8rem;
      border-radius: 2rem;
      font-weight: 600;
      font-size: 1rem;
      display: inline-block;
      margin-bottom: 1rem;
    }
    .final-slide {
      background: linear-gradient(135deg, #3B82F6, #8B5CF6) !important;
    }
    .final-slide h1, .final-slide p {
      color: #FFFFFF;
      -webkit-text-fill-color: #FFFFFF;
      background: none;
    }
    ul {
      list-style: none;
      text-align: left;
      max-width: 600px;
    }
    ul li {
      margin-bottom: 1rem;
      font-size: 1.2rem;
    }
    ul li::before {
      content: "🔹";
      margin-right: 0.5rem;
      color: #3B82F6;
    }
  </style>
</head>
<body>
  <button class="exit-btn" onclick="window.location.href='/'">← Voltar ao Hub</button>
  <div class="slide-container" id="slideContainer"></div>
  <div class="page-indicator" id="pageIndicator"></div>

  <script>
    const slides = [
      {
        type: 'title',
        tag: 'LANÇAMENTO OFICIAL',
        title: 'JWZ Platform',
        subtitle: 'Do Cadastro à Primeira Conexão',
        description: 'Facilitando o Home Office para quem oferece e para quem contrata.'
      },
      {
        type: 'list',
        title: 'O Grande Desafio do Home Office',
        items: [
          'Dificuldade para encontrar profissionais qualificados',
          'Processos de contratação lentos e caros',
          'Falta de portfólio confiável',
          'Oportunidades dispersas'
        ]
      },
      {
        type: 'content',
        title: 'A Solução é a JWZ',
        text: 'A plataforma que conecta talento remoto com oportunidades reais de forma simples e confiável.'
      },
      {
        type: 'cards',
        title: 'O DIFERENCIAL DO SITE',
        cards: [
          { title: 'Para o Prestador', desc: 'Cadastro focado em habilidades, portfólio e experiência. Destaque-se e conquiste clientes.' },
          { title: 'Para o Contratante', desc: 'Encontre rapidamente os melhores profissionais para trabalho remoto / home office.' }
        ],
        extra: 'Captura de tela salva 📸'
      },
      {
        type: 'list',
        title: 'PLANO DE PRODUÇÃO DO VÍDEO (Reels)',
        items: [
          'Gancho de Atenção (Problema real)',
          'Demonstração prática da JWZ',
          'Call to Action forte'
        ]
      },
      {
        type: 'cards',
        title: 'CRONOGRAMA DE EXECUÇÃO',
        cards: [
          { title: '1. Pré-produção', desc: 'Roteiro, captação de recursos e planejamento.' },
          { title: '2. Produção', desc: 'Gravação e edição do material.' },
          { title: '3. Lançamento', desc: 'Publicação e impulsionamento estratégico.' }
        ]
      },
      {
        type: 'final',
        title: 'Vamos transformar a JWZ em referência!',
        text: 'O futuro do trabalho remoto começa agora.'
      }
    ];

    let currentSlide = 0;
    const container = document.getElementById('slideContainer');
    const indicator = document.getElementById('pageIndicator');

    function renderSlide(index) {
      const slide = slides[index];
      if (!slide) return;
      
      let html = '';
      switch (slide.type) {
        case 'title':
          html = `<div class="slide active">
                    <span class="tag">${slide.tag}</span>
                    <h1>${slide.title}</h1>
                    <p style="font-size:1.4rem; font-weight:600; color:#F8FAFC;">${slide.subtitle}</p>
                    <p style="margin-top:1rem; color:#94A3B8;">${slide.description}</p>
                  </div>`;
          break;
        case 'content':
          html = `<div class="slide active">
                    <h2>${slide.title}</h2>
                    <p style="font-size:1.3rem;">${slide.text}</p>
                  </div>`;
          break;
        case 'list':
          const itemsHtml = slide.items.map(i => `<li>${i}</li>`).join('');
          html = `<div class="slide active">
                    <h2>${slide.title}</h2>
                    <ul>${itemsHtml}</ul>
                  </div>`;
          break;
        case 'cards':
          const cardsHtml = slide.cards.map(c => `
            <div class="card-item">
              <h3>${c.title}</h3>
              <p>${c.desc}</p>
            </div>
          `).join('');
          const extra = slide.extra ? `<p style="margin-top:1.5rem; color:#64748B; font-style:italic;">${slide.extra}</p>` : '';
          html = `<div class="slide active">
                    <h2>${slide.title}</h2>
                    <div class="card-grid">${cardsHtml}</div>
                    ${extra}
                  </div>`;
          break;
        case 'final':
          html = `<div class="slide active final-slide">
                    <h1 style="color:white; -webkit-text-fill-color:white;">${slide.title}</h1>
                    <p style="font-size:1.6rem; color:white; margin-top:1rem;">${slide.text}</p>
                  </div>`;
          break;
        default: html = '';
      }
      container.innerHTML = html;
      indicator.textContent = `${index + 1} / ${slides.length}`;
    }

    function nextSlide() {
      if (currentSlide < slides.length - 1) {
        currentSlide++;
        renderSlide(currentSlide);
      }
    }
    function prevSlide() {
      if (currentSlide > 0) {
        currentSlide--;
        renderSlide(currentSlide);
      }
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
        e.preventDefault();
        nextSlide();
      } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
        e.preventDefault();
        prevSlide();
      } else if (e.key === 'Escape') {
        window.location.href = '/';
      }
    });

    // Suporte a touch para dispositivos móveis
    let touchStartX = 0;
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    });
    document.addEventListener('touchend', (e) => {
      const diff = e.changedTouches[0].screenX - touchStartX;
      if (diff < -40) nextSlide();
      else if (diff > 40) prevSlide();
    });

    renderSlide(0);
  </script>
</body>
</html>
