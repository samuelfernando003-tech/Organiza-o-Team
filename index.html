<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWZ Team & Vision - Hub de Apresentações</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #0B1121;
            color: #E2E8F0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hub {
            text-align: center;
            max-width: 900px;
            width: 100%;
            padding: 2rem;
        }
        .hub h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            font-size: 1.2rem;
            color: #94A3B8;
            margin-bottom: 2rem;
        }
        .cards {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 2rem;
        }
        .card {
            background: #131B2F;
            border: 1px solid #1E293B;
            border-radius: 1.5rem;
            padding: 2rem;
            width: 280px;
            text-align: left;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(59,130,246,0.2);
            border-color: #3B82F6;
        }
        .card-tag {
            display: inline-block;
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            padding: 0.3rem 1rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: white;
        }
        .card h2 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 0.8rem;
            color: #F8FAFC;
        }
        .card p {
            color: #94A3B8;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1.5rem;
        }
        .card-actions {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        .card-btn {
            background: #1E293B;
            border: 1px solid #334155;
            color: #CBD5E1;
            padding: 0.5rem 1rem;
            border-radius: 0.6rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-block;
        }
        .card-btn:hover {
            background: #273450;
            border-color: #3B82F6;
        }
        .card-btn.primary {
            background: linear-gradient(135deg, #3B82F6, #8B5CF6);
            border: none;
            color: white;
            font-weight: 600;
        }
        .card-btn.primary:hover { opacity: 0.9; }
        .new-pres-btn {
            background: linear-gradient(135deg, #10B981, #059669);
            border: none;
            color: white;
            font-weight: 600;
            padding: 0.8rem 2rem;
            border-radius: 0.8rem;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: opacity 0.2s;
        }
        .new-pres-btn:hover { opacity: 0.9; }
        .arrow-hint {
            margin-top: 1.5rem;
            color: #64748B;
            font-size: 0.9rem;
        }
        .empty-msg {
            color: #64748B;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="hub">
        <h1>JWZ TEAM & VISION</h1>
        <p class="subtitle">Centro de Apresentações Profissionais</p>
        <div class="cards" id="presentationCards">
            <p class="empty-msg">Carregando apresentações...</p>
        </div>
        <button class="new-pres-btn" id="newPresBtn">➕ Nova Apresentação</button>
        <p class="arrow-hint">Use as setas do teclado nas apresentações • Pressione ESC para sair</p>
    </div>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDPerdPbaYCgzJzpqBK6IMHdMaCVXijGPA",
            authDomain: "canva-jwz.firebaseapp.com",
            projectId: "canva-jwz",
            storageBucket: "canva-jwz.firebasestorage.app",
            messagingSenderId: "492129376064",
            appId: "1:492129376064:web:f2ade84324e2d975dd4ca5"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const presentationsCol = db.collection('presentations');

        const cardsContainer = document.getElementById('presentationCards');
        const newPresBtn = document.getElementById('newPresBtn');

        function renderCards(presentations) {
            cardsContainer.innerHTML = '';
            if (presentations.length === 0) {
                cardsContainer.innerHTML = '<p class="empty-msg">Nenhuma apresentação encontrada. Crie uma nova!</p>';
                return;
            }
            presentations.forEach(pres => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <span class="card-tag">${(pres.id || '').toUpperCase()}</span>
                    <h2>${pres.title || 'Sem título'}</h2>
                    <p>${pres.slides ? pres.slides.length : 0} slides</p>
                    <div class="card-actions">
                        <button class="card-btn primary view-btn" data-id="${pres.id}">▶ Visualizar</button>
                        <button class="card-btn edit-btn" data-id="${pres.id}">✏️ Editar</button>
                        <button class="card-btn delete-btn" data-id="${pres.id}">🗑️ Excluir</button>
                    </div>
                `;
                cardsContainer.appendChild(card);
            });

            // Event listeners
            document.querySelectorAll('.view-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.id;
                    window.location.href = `apresentacao.html?id=${id}`;
                });
            });
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = btn.dataset.id;
                    window.location.href = `editor.html?id=${id}`;
                });
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const id = btn.dataset.id;
                    if (confirm(`Excluir a apresentação "${id}"?`)) {
                        await presentationsCol.doc(id).delete();
                        loadPresentations();
                    }
                });
            });
        }

        async function loadPresentations() {
            try {
                const snapshot = await presentationsCol.orderBy('updatedAt', 'desc').get();
                const presentations = [];
                snapshot.forEach(doc => {
                    presentations.push({ id: doc.id, ...doc.data() });
                });
                renderCards(presentations);
            } catch (error) {
                console.error('Erro ao carregar apresentações:', error);
                cardsContainer.innerHTML = '<p class="empty-msg">Erro ao carregar. Verifique sua conexão.</p>';
            }
        }

        newPresBtn.addEventListener('click', () => {
            const id = prompt('Digite um identificador para a nova apresentação (ex: "nova"):');
            if (!id) return;
            window.location.href = `editor.html?id=${encodeURIComponent(id)}`;
        });

        loadPresentations();
    </script>
</body>
</html>
